# Render Blueprint Configuration
# Deploy this file to Render to spin up the database, backend web service, and frontend static site automatically.

databases:
  - name: medical-lab-db
    plan: free

services:
  # Backend Web Service (FastAPI)
  - type: web
    name: medical-lab-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medical-lab-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

  # Frontend Static Site (React/Vite)
  - type: web
    name: medical-lab-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Rewrite rule to support client-side routing (React Router) in SPAs
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: medical-lab-backend
          envVarKey: RENDER_EXTERNAL_URL
